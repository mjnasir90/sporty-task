spring:
  application:
    name: feed-processor
  jackson:
    serialization:
      write-dates-as-timestamps: false   # Instant → ISO-8601 string
    deserialization:
      fail-on-unknown-properties: false

server:
  port: 8080

logging:
  level:
    com.sporty.feed: DEBUG

# Swap to "kafka" when a KafkaMessagePublisher implementing MessagePublisher is added.
messaging:
  type: in-memory
    
